<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TavernMaster Admin Login</title>
    <style>
        :root {
            --tm-negro: #252423;
            --tm-negro-elevado: #32302e;
            --tm-rojo: #b84a4a;
            --tm-rojo-oscuro: #8f3838;
            --tm-crema: #ede6dc;
            --tm-crema-claro: #faf7f2;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #3a3634 0%, var(--tm-negro) 58%, #1f1e1d 100%);
            color: var(--tm-crema-claro);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--tm-negro-elevado);
            border: 1px solid #4f4945;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 16px 36px rgba(0,0,0,.32);
        }
        h1 {
            margin: 0 0 6px 0;
            color: var(--tm-crema-claro);
            text-align: center;
            letter-spacing: .4px;
        }
        .subtitle {
            color: var(--tm-crema);
            text-align: center;
            margin-bottom: 22px;
            opacity: .92;
        }
        .form-group { margin-bottom: 14px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--tm-crema);
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #5d5651;
            border-radius: 8px;
            background: #2a2826;
            color: var(--tm-crema-claro);
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #d07d7d;
            box-shadow: 0 0 0 2px rgba(184, 74, 74, .35);
        }
        button {
            width: 100%;
            background: linear-gradient(180deg, #c45c5c, var(--tm-rojo));
            color: var(--tm-crema-claro);
            padding: 12px;
            border: 1px solid #8f3838;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .12s ease, filter .15s ease;
        }
        button:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }
        .auth-error {
            margin-top: 12px;
            background: rgba(143, 56, 56, .3);
            border: 1px solid var(--tm-rojo-oscuro);
            color: var(--tm-crema-claro);
            border-radius: 8px;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>🏰 TavernMaster</h1>
    <div class="subtitle">Acceso de administrador</div>
    <form id="formLoginAdmin">
        <div class="form-group">
            <label for="loginNombreJug">Usuario</label>
            <input type="text" id="loginNombreJug" placeholder="Nombre de jugador" required>
        </div>
        <div class="form-group">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit">Entrar</button>
    </form>
    <div id="loginError" class="auth-error"></div>
</div>

<script>
    const API_BASE = '/api';
    const AUTH_STORAGE_KEY = 'tm_admin_auth';

    const sesionActual = sessionStorage.getItem(AUTH_STORAGE_KEY);
    if (sesionActual) {
        window.location.href = '/Index.html';
    }

    function mostrarErrorLogin(message) {
        const box = document.getElementById('loginError');
        if (!box) return;
        if (!message) {
            box.style.display = 'none';
            box.textContent = '';
            return;
        }
        box.style.display = 'block';
        box.textContent = message;
    }

    async function loginAdmin() {
        const nombreJug = document.getElementById('loginNombreJug')?.value?.trim();
        const password = document.getElementById('loginPassword')?.value ?? '';
        if (!nombreJug || !password) {
            mostrarErrorLogin('Introduce usuario y contraseña');
            return;
        }

        const response = await fetch(`${API_BASE}/jugadores/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombreJug, password })
        });

        if (!response.ok) {
            mostrarErrorLogin('Usuario o contraseña incorrectos');
            return;
        }

        const jugador = await response.json();
        const esAdmin = (jugador.es_admin ?? jugador.esAdmin) === true;
        if (!esAdmin) {
            mostrarErrorLogin('Solo los administradores pueden acceder');
            return;
        }

        const nombreAdmin = jugador.nombre_jug || jugador.nombreJug || nombreJug;
        sessionStorage.setItem(AUTH_STORAGE_KEY, nombreAdmin);
        window.location.href = '/Index.html';
    }

    document.getElementById('formLoginAdmin')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        await loginAdmin();
    });
</script>
</body>
</html>
