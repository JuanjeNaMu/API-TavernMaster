# ----- CONEXION MYSQL EN AWS -----
spring.datasource.url=jdbc:mysql://3.210.180.171:3306/TavernMaster?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=60000&socketTimeout=60000&tcpKeepAlive=true
