# ============================================
# CONFIGURACION TAVERNMASTER - AWS CON FLYWAY
# CON NOMBRES DE TABLAS EN MAYUSCULAS
# ============================================

# ----- CONEXION MYSQL EN AWS -----
spring.datasource.url=jdbc:mysql://3.210.180.171:3306/TavernMaster?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=60000&socketTimeout=60000&tcpKeepAlive=true
spring.datasource.username=admin
spring.datasource.password=g4bTHzZSMePE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari optimizado para t3.micro (menos memoria y menos conexiones simultaneas)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.keepalive-time=90000
spring.datasource.hikari.validation-timeout=5000

# ----- JPA / HIBERNATE -----
spring.jpa.hibernate.ddl-auto=update

# FORZAR NOMBRES DE TABLAS EN MAYUSCULAS (CAMPANA, JUGADOR, PERSONAJE)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ----- REDUCIR CARGA DE LOGS -----
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ----- LOGGING (MODO PRODUCCION LIGERO) -----
logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.com.zaxxer.hikari=WARN

# Reducir consumo de hilos HTTP en entorno pequeno
server.tomcat.threads.max=30
server.tomcat.accept-count=20

# Timeouts para evitar conexiones colgadas
server.connection-timeout=15s
spring.mvc.async.request-timeout=20000

# ----- JACKSON JSON -----
spring.jackson.property-naming-strategy=SNAKE_CASE
