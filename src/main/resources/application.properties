spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari: MySQL remoto (AWS) suele cortar conexiones idle; renovar antes del wait_timeout del servidor
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=170000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=120000

# ----- JPA / HIBERNATE -----
spring.jpa.hibernate.ddl-auto=update

# FORZAR NOMBRES DE TABLAS EN MAYUSCULAS (CAMPANA, JUGADOR, PERSONAJE)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ----- MOSTRAR SQL EN CONSOLA (OPCIONAL) -----
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----- LOGGING (OPCIONAL) -----
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ----- JACKSON JSON -----
spring.jackson.property-naming-strategy=SNAKE_CASE